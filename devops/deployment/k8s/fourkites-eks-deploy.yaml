# DevLake – FourKites Engineering Signals
# Target: common-eks-dev cluster, namespace: fourkites-devlake
# DB: PostgreSQL on RDS (ai-hackathon.c2d5htxcqrdu.us-east-1.rds.amazonaws.com)
#
# DEMO MODE: credentials are hardcoded inline — DO NOT use in production.
#
# To apply:
#   kubectl apply -f fourkites-eks-deploy.yaml

---
apiVersion: v1
kind: Namespace
metadata:
  name: fourkites-devlake

---
# Non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: devlake-config
  namespace: fourkites-devlake
data:
  DB_URL: "postgresql://fkadmin:FKsupport25@ai-hackathon.c2d5htxcqrdu.us-east-1.rds.amazonaws.com:5432/ai_hackathon?sslmode=require"
  DEVLAKE_ENDPOINT: "devlake.fourkites-devlake.svc.cluster.local:8080"
  GRAFANA_ENDPOINT: "grafana.fourkites-devlake.svc.cluster.local:3000"
  LOGGING_DIR: "/app/logs"
  # Grafana data source (Postgres) — non-secret fields
  GF_DATABASE_TYPE: "postgres"
  GF_DATABASE_HOST: "ai-hackathon.c2d5htxcqrdu.us-east-1.rds.amazonaws.com:5432"
  GF_DATABASE_NAME: "ai_hackathon"
  GF_DATABASE_USER: "fkadmin"
  GF_DATABASE_SSL_MODE: "require"
  GF_USERS_DEFAULT_THEME: "light"
  # Grafana dashboard data source (DevLake data)
  PG_URL: "ai-hackathon.c2d5htxcqrdu.us-east-1.rds.amazonaws.com"
  PG_PORT: "5432"
  PG_USER: "fkadmin"
  PG_DATABASE: "ai_hackathon"
  TZ: "UTC"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-storage
  namespace: fourkites-devlake
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: gp2

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: devlake-logs
  namespace: fourkites-devlake
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: gp2

---
# ── DevLake backend ───────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devlake
  namespace: fourkites-devlake
  labels:
    app: devlake
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devlake
  template:
    metadata:
      labels:
        app: devlake
    spec:
      containers:
        - name: devlake
          # Replace with your ECR image if you built the custom fork with aicode/chronosphere plugins:
          #   <account>.dkr.ecr.us-east-1.amazonaws.com/fourkites/devlake:latest
          image: apache/devlake:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: devlake-config
          env:
            - name: ENCRYPTION_SECRET
              value: "f35809c211738e4f156ffbdece7e4192"
          volumeMounts:
            - name: logs
              mountPath: /app/logs
          readinessProbe:
            httpGet:
              path: /ping
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: logs
          persistentVolumeClaim:
            claimName: devlake-logs

---
apiVersion: v1
kind: Service
metadata:
  name: devlake
  namespace: fourkites-devlake
spec:
  selector:
    app: devlake
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080

---
# ── Config UI ─────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-ui
  namespace: fourkites-devlake
  labels:
    app: config-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-ui
  template:
    metadata:
      labels:
        app: config-ui
    spec:
      containers:
        - name: config-ui
          image: apache/devlake-config-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: devlake-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

---
apiVersion: v1
kind: Service
metadata:
  name: config-ui
  namespace: fourkites-devlake
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internal"
spec:
  type: LoadBalancer
  selector:
    app: config-ui
  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000

---
# ── Grafana ───────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: fourkites-devlake
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: apache/devlake-dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: devlake-config
          env:
            - name: GF_DATABASE_PASSWORD
              value: "FKsupport25"
            - name: PG_PASSWORD
              value: "FKsupport25"
            - name: GF_SERVER_ROOT_URL
              value: "%(protocol)s://%(domain)s/grafana"
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-storage

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: fourkites-devlake
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internal"
spec:
  type: LoadBalancer
  selector:
    app: grafana
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
